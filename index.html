<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice Search</title>
</head>
<body>
    <header>
        <h1>Invoice Search</h1>
    </header>
    <main>
        <form id="searchForm">
            <label for="invoiceNumber">Invoice Number:</label>
            <input type="text" id="invoiceNumber" name="invoiceNumber">
            <label for="customerName">Customer Name:</label>
            <input type="text" id="customerName" name="customerName">
            <button type="submit">Search</button>
        </form>
        <div id="searchResults"></div>
    </main>
    <script>
        document.getElementById('searchForm').addEventListener('submit', function (event) {
            event.preventDefault();
            const invoiceNumber = document.getElementById('invoiceNumber').value;
            const customerName = document.getElementById('customerName').value;

            // Placeholder for search logic
            document.getElementById('searchResults').innerHTML = `<p>Searching for Invoice Number: ${invoiceNumber} and Customer Name: ${customerName}</p>`;
        });
    </script>
</body>
</html>
