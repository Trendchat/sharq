<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sharq Invoice Search</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Sharq Invoice Search</h1>
    </header>
    <main>
        <section id="search-section">
            <form id="invoice-search-form">
                <label for="invoice-number">Invoice Number:</label>
                <input type="text" id="invoice-number" name="invoice-number" required>
                <button type="submit">Search</button>
            </form>
            <div id="results"></div>
        </section>
        <section id="modal-section">
            <div id="modal" class="modal">
                <div class="modal-content">
                    <span class="close-button">&times;</span>
                    <h2>Invoice Details</h2>
                    <p id="invoice-details">Details will be populated here.</p>
                </div>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
